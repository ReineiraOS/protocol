name: Publish SDK

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk/**'
      - 'packages/shared/contracts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Compile shared contracts (SDK depends on ABIs)
        run: pnpm --filter @reineira-os/shared run compile

      - name: Build SDK
        run: pnpm --filter @reineira-os/sdk run build

      - name: Test SDK
        run: pnpm --filter @reineira-os/sdk run test

      - name: Verify dist output
        run: |
          test -f packages/sdk/dist/index.js || (echo "❌ dist/index.js (CJS) missing" && exit 1)
          test -f packages/sdk/dist/index.mjs || (echo "❌ dist/index.mjs (ESM) missing" && exit 1)
          test -f packages/sdk/dist/index.d.ts || (echo "❌ dist/index.d.ts (types) missing" && exit 1)
          echo "✅ dist/ verified: index.js (CJS), index.mjs (ESM), index.d.ts (types)"

      - name: Semantic Release
        working-directory: packages/sdk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
