name: CI

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["*"]
    paths:
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9"
  FOUNDRY_PROFILE: default

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint Solidity
        run: npx solhint 'packages/*/contracts/**/*.sol'

  compile-and-test-contracts:
    name: Compile & Test Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/*/out
            packages/*/foundry-cache
          key: foundry-${{ runner.os }}-${{ hashFiles('packages/*/foundry.toml', 'packages/*/contracts/**/*.sol') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Compile shared
        run: cd packages/shared && forge build

      - name: Compile & test orchestration
        run: cd packages/orchestration && forge build && forge test -vv

      - name: Compile & test escrow
        run: cd packages/escrow && forge build && forge test -vv

      - name: Compile & test recourse
        run: cd packages/recourse && forge build && forge test -vv

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @reineira-os/sdk run build

      - name: Test SDK
        run: pnpm --filter @reineira-os/sdk run test

  test-operators:
    name: Test Operators
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Test operators
        run: cd packages/offchain && pnpm run ci

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @reineira-os/sdk run build

      - name: Verify dist output
        run: test -d packages/sdk/dist && echo "dist/ exists" || (echo "dist/ missing" && exit 1)
