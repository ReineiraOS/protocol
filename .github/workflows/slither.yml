name: Slither

on:
  push:
    branches: [main]
    paths:
      - "packages/*/contracts/**"
      - "packages/*/foundry.toml"
      - "slither.config.json"
      - "scripts/run-slither.sh"
      - ".github/workflows/slither.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9"
  SLITHER_VERSION: "0.11.5"

permissions:
  contents: read
  pull-requests: write

jobs:
  slither:
    name: Slither — ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        package: [escrow, recourse]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Compile shared
        run: cd packages/shared && forge build

      - name: Compile package
        run: cd packages/${{ matrix.package }} && forge build --skip test

      - name: Install Slither
        run: pipx install slither-analyzer==${{ env.SLITHER_VERSION }}

      - name: Run Slither
        continue-on-error: true
        working-directory: packages/${{ matrix.package }}
        run: |
          slither . \
            --config-file ../../slither.config.json \
            --compile-force-framework foundry \
            --checklist \
            --markdown-root https://github.com/${{ github.repository }}/blob/${{ github.sha }}/ \
            --no-fail-pedantic \
            > ../../slither-${{ matrix.package }}.md 2>&1 || true

      - name: Upload Slither report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: slither-${{ matrix.package }}
          path: slither-${{ matrix.package }}.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: slither-${{ matrix.package }}
          path: slither-${{ matrix.package }}.md
