[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
cache_path = "foundry-cache"
libs = ["node_modules", "../../node_modules"]

remappings = [
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "@openzeppelin/contracts-upgradeable/=node_modules/@openzeppelin/contracts-upgradeable/",
    "@fhenixprotocol/cofhe-contracts/=../../node_modules/@fhenixprotocol/cofhe-contracts/",
    "@cofhe/mock-contracts/=../../node_modules/@cofhe/mock-contracts/",
    "@cofhe/foundry-plugin/=../../node_modules/@cofhe/foundry-plugin/",
    "fhenix-confidential-contracts/=../../node_modules/fhenix-confidential-contracts/",
    "@reineira-os/shared/=node_modules/@reineira-os/shared/",
    "forge-std/=../../node_modules/forge-std/src/",
    "hardhat/=../../node_modules/forge-std/src/",
]

solc_version = "0.8.25"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

# Style-only notes excluded: Foundry test_* naming + deliberate immutable/struct conventions (asm-keccak256: keep readable keccak256 over inline asm)
[profile.default.lint]
exclude_lints = [
    "unwrapped-modifier-logic",
    "mixed-case-function",
    "screaming-snake-case-immutable",
    "mixed-case-variable",
    "named-struct-fields",
    "pascal-case-struct",
    "asm-keccak256",
]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = false
call_override = false
